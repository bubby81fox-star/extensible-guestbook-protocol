<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Extensible Guestbook v0.1.1</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>body{font-family:system-ui;padding:16px;margin:0;background:#fafafa}.header{font-size:20px;font-weight:bold;margin-bottom:4px}.url{font-size:12px;color:#06c;margin-bottom:2px;word-break:break-all}.identity{background:#f0f9ff;padding:10px;border:1px solid #b3e0ff;border-radius:6px;margin:12px 0}.hash{font-family:monospace;font-size:11px;color:#06c;word-break:break-all;cursor:pointer}.entry{background:#fff;padding:12px;margin:8px 0;border-left:3px solid #ddd;border-radius:4px}.high{border-left-color:#f33;background:#fff5f5}.author{font-weight:bold}.time{font-size:10px;color:#999;margin-top:4px}textarea{width:100%;padding:8px;margin:8px 0;box-sizing:border-box;border:1px solid #ccc;border-radius:4px}button{padding:12px;width:100%;background:#06c;color:#fff;border:none;border-radius:4px;font-size:16px}button:disabled{background:#ccc}.hint{font-size:11px;color:#666;text-align:center;margin-top:6px}.status{font-size:10px;color:#090;text-align:center;margin:8px 0;padding:4px}.error{color:#c00}.empty{color:#999;text-align:center;padding:20px}</style></head><body><div class="header">Extensible Guestbook v0.1.1</div><div class="url" id="url"></div><div class="status" id="status">Connecting...</div><div class="identity"><div><strong>Signed in as:</strong> MacMut ✓ VERIFIED</div><div style="font-size:10px;margin-top:4px">Author ID:</div><div class="hash" id="hash" onclick="toggleHash()"></div><div style="font-size:9px;color:#999;text-align:center">Tap to toggle full hash</div></div><div id="entries"></div><textarea id="body" placeholder="Sign guestbook... Use!!! for urgent" rows="3"></textarea><button id="postBtn" onclick="postEntry()">Post Entry</button><div class="hint" id="hint"></div><script>
const SUPABASE_URL='https://truqoflxtgegvrsqzsnt.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRydXFvZmx4dGdlZ3Zyc3F6c250Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDgxODUsImV4cCI6MjA5NDg4NDE4NX0.U9fqDvOm3aItLMJkiA7MKZj4yJWe7Yka5YKuJoIN1ZE';
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const GENESIS_AUTHOR={id:'499a8d7e98729906d32a9f43205d5906287ebd49b0b5b65e7e4ca1a4e8252133',display_name:'bubby'};
function normalizeUrl(u){let c=u.toLowerCase().replace(/^https?:\/\//,'').replace(/^www\./,'').replace(/\/$/,'').split('?')[0].split('#')[0];const w=c.match(/^web\.archive\.org\/web\/[0-9]+\/(.+)$/);if(w)c=w[1].replace(/^https?:\/\//,'').replace(/^www\./,'');return c}
const params=new URLSearchParams(window.location.search);
const rawUrl=params.get('url')||'http://Hometown.AOL.com/~Jeff/';
const canonicalUrl=normalizeUrl(rawUrl);
let showFullHash=false;let entries=[];
async function loadEntries(){document.getElementById('status').textContent='Loading...';document.getElementById('status').className='status';const{data,error}=await supabase.from('guestbook_entries').select('*').eq('canonical_url',canonicalUrl).order('created_at',{ascending:false}).limit(50);if(error){document.getElementById('status').textContent='Error: '+error.message;document.getElementById('status').className='status error';return}entries=data||[];document.getElementById('status').textContent=`Loaded ${entries.length} entries from Supabase`;render()}
function render(){document.getElementById('url').textContent=`Guestbook for: ${canonicalUrl}`;document.getElementById('hash').textContent=showFullHash?GENESIS_AUTHOR.id:`${GENESIS_AUTHOR.id.slice(0,8)}...${GENESIS_AUTHOR.id.slice(-8)}`;const b=document.getElementById('body').value;document.getElementById('hint').textContent=`Priority: ${b.includes('!!!')?'HIGH - fold 3x':'normal'} | Entries survive refresh`;document.getElementById('entries').innerHTML=entries.map(e=>`<div class="entry ${e.metadata?.priority==='high'?'high':''}"><div class="author">${e.author_display_name}${e.metadata?.priority==='high'?'!!! URGENT':''}</div><div>${e.body}</div><div class="time">${new Date(e.created_at).toLocaleString()}</div></div>`).join('')||'<div class="empty">No entries yet. Be first to sign!</div>'}
function toggleHash(){showFullHash=!showFullHash;render()}
async function postEntry(){const b=document.getElementById('body').value.trim();if(!b)return alert('Sign the guestbook');if(b.length>500)return alert('Max 500 chars');document.getElementById('postBtn').disabled=true;document.getElementById('status').textContent='Posting...';const{error}=await supabase.from('guestbook_entries').insert({canonical_url:canonicalUrl,author_id:GENESIS_AUTHOR.id,author_display_name:GENESIS_AUTHOR.display_name,body:b,type:'comment',metadata:{priority:b.includes('!!!')?'high':'normal'}});if(error){alert('Error: '+error.message);document.getElementById('status').textContent='Post failed';document.getElementById('status').className='status error'}else{document.getElementById('body').value='';document.getElementById('status').textContent='Posted!';await loadEntries()}document.getElementById('postBtn').disabled=false}
document.getElementById('body').addEventListener('input',render);
loadEntries();
</script></body></html>
